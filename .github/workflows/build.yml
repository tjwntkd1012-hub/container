name: Build Kasm Official Wine Image

on:
  workflow_dispatch:

jobs:
  build-wine:
    runs-on: ubuntu-latest
    steps:
      - name: Docker Pull
        run: |
          # 1. 이미 빌드되어 있는 공식 Wine 이미지를 통째로 가져옵니다.
          docker pull kasmweb/wine:1.15.0
          
      - name: Save to Tar
        run: |
          # 2. 가져온 이미지를 tar 파일로 구웁니다.
          docker save -o kasm_wine.tar kasmweb/wine:1.15.0
          
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kasm-official-wine-tar
          path: kasm_wine.tar
          retention-days: 1
