name: Build Air-Gap Infrastructure

on:
  workflow_dispatch: # 수동으로 버튼 눌러서 실행

jobs:
  build-infra:
    runs-on: windows-latest

    steps:
      - name: Create Workspace
        run: mkdir infra_package

      - name: Download Docker Engine (v27.x)
        shell: powershell
        run: |
          # 최신 정적 바이너리 다운로드
          $url = "https://download.docker.com/win/static/stable/x86_64/docker-27.3.1.zip"
          Invoke-WebRequest -Uri $url -OutFile "infra_package/docker.zip"

      - name: Pull and Save Windows Image
        shell: powershell
        run: |
          # 전시기 SW용 Server Core LTSC 2022
          $IMAGE = "mcr.microsoft.com/windows/servercore:ltsc2022"
          
          Write-Host "이미지 Pull 중..."
          docker pull $IMAGE
          
          Write-Host "이미지 저장 중 (약 2~3GB)..."
          docker save -o "infra_package/servercore_2022.tar" $IMAGE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Docker-LTSC2022-Infra
          path: infra_package/
          retention-days: 1
